<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images, tables , list </title>
</head>

<body>
    <img width="280" src="bmw-css-7-series-protection-ms-new-standard.jpg" alt="bmw car ">
    <table style="border: 2px solid black">
        <caption> data scientist</caption>
        <thead>
            <tr>
                <th>name</th>
                <th>age</th>
                <th>degination </th>

            </tr>
        </thead>
        <tbody>
            <tr>
                <td style="width: 10px;">harpreet singh </td>
                <td>18 </td>
                <td style="width: 45px;"><a href="http://www.google.com">web developer</a></td>
            </tr>

        </tbody>
    </table>
    <tfoot>
        <tr>
            <td colspan="2">ishant</td>
            <td rowspan="2">web developer</td>
        </tr>
    </tfoot>


    <ul type="square">
        <li>ishant</li>
        <li>harpreet</li>
        <li>isham</li>
    </ul>
    <ol type="i">
        <li>ishant</li>
        <li>harpreet</li>
        <li>isham</li>
    </ol>

</body>

</html>
